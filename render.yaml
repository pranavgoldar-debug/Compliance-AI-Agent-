databases:
  # Free Postgres add-on. Render expires free databases after 90 days —
  # upgrade or take a manual backup before then via the Render dashboard.
  - name: compliance-agent-db
    plan: free
    region: oregon

services:
  - type: web
    name: compliance-ai-agent
    runtime: python
    plan: free
    region: oregon
    # Deployed branch. Render reads this from the selected branch in the
    # dashboard, so also set Settings → Branch to match.
    branch: claude/upbeat-turing-DCFHF
    buildCommand: pip install -e ".[postgres]" && cd frontend && npm ci && npm run build && mkdir -p ../src/compliance_agent/data/webapp && cp -r dist/. ../src/compliance_agent/data/webapp/
    startCommand: uvicorn compliance_agent.web:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/fintech/countries
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # Wires the FastAPI app to the Postgres add-on declared above.
      # NOTE: free Postgres expires after ~90 days. Once it's gone this URL
      # points at a dead host — the app probes it at boot and automatically
      # falls back to a local (ephemeral) SQLite DB so the service still
      # starts and auto-seeds. Set COMPLIANCE_DB_STRICT=1 to disable that
      # fallback once you're on a managed Postgres.
      - key: COMPLIANCE_DB_URL
        fromDatabase:
          name: compliance-agent-db
          property: connectionString
      # APP_SECRET is auto-generated on first deploy and kept stable across
      # redeploys — needed to sign session JWTs.
      - key: APP_SECRET
        generateValue: true
      # COMPLIANCE_AGENT_LIVE / ANTHROPIC_API_KEY / SMTP_* / Slack are
      # intentionally NOT declared here. Add them as environment variables
      # in the Render dashboard so they stay out of git.
      # (To A/B against Grok: set OPENROUTER_API_KEY + OPENROUTER_MODEL=x-ai/grok-4.3
      #  in the dashboard — llm_client routes through OpenRouter when the key is
      #  present. Default with only ANTHROPIC_API_KEY set is Claude.)
      #
      # After the FIRST successful deploy, open Render → service → Shell
      # and run `python -m compliance_agent.cli seed` once to populate
      # entities + rules. The seed is idempotent.

  # Daily reminder cron — runs `compliance-agent send-reminders` at 09:00
  # UTC. Sends email + Slack pings for obligations entering their offset
  # window. Idempotent across runs.
  - type: cron
    name: compliance-agent-reminders
    runtime: python
    plan: free
    region: oregon
    branch: claude/upbeat-turing-DCFHF
    schedule: "0 9 * * *"
    buildCommand: pip install -e ".[postgres]"
    startCommand: python -m compliance_agent.cli send-reminders
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: COMPLIANCE_DB_URL
        fromDatabase:
          name: compliance-agent-db
          property: connectionString

  # Daily employee morning brief. 04:30 UTC = 10:00 AM IST.
  # Picks every active user, builds their open-items context, has Claude
  # compose a tight prioritised digest, posts to the workspace Slack
  # channel + emails them (if SMTP is wired). Idempotent per (user, day).
  - type: cron
    name: compliance-agent-employee-digest
    runtime: python
    plan: free
    region: oregon
    branch: claude/upbeat-turing-DCFHF
    schedule: "30 4 * * *"
    buildCommand: pip install -e ".[postgres]"
    startCommand: python -m compliance_agent.cli send-digest --kind employee_daily
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: COMPLIANCE_DB_URL
        fromDatabase:
          name: compliance-agent-db
          property: connectionString
      # COMPLIANCE_AGENT_LIVE + OPENROUTER_API_KEY (or ANTHROPIC_API_KEY)
      # must be set in the Render dashboard for the digest to be AI-
      # composed. Without them it falls back to a deterministic template.

  # Weekly admin recap. 04:30 UTC Monday = 10:00 AM IST Monday.
  - type: cron
    name: compliance-agent-admin-recap
    runtime: python
    plan: free
    region: oregon
    branch: claude/upbeat-turing-DCFHF
    schedule: "30 4 * * 1"
    buildCommand: pip install -e ".[postgres]"
    startCommand: python -m compliance_agent.cli send-digest --kind admin_weekly
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: COMPLIANCE_DB_URL
        fromDatabase:
          name: compliance-agent-db
          property: connectionString
