<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Aspora">
  <rect width="64" height="64" rx="12" fill="#6F4FE0"/>
  <!--
    Aspora 4-point sparkle. Built from a single path with concave sides —
    same silhouette as the brand mark. The shape is a square rotated 45°
    whose edges curve inward through the centre.
  -->
  <path
    d="M32 8
       C 32 22, 42 22, 56 32
       C 42 42, 32 42, 32 56
       C 32 42, 22 42, 8 32
       C 22 22, 32 22, 32 8 Z"
    fill="#FFFFFF"/>
</svg>
